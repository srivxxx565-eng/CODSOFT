<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Basic Calculator</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family: Arial, sans-serif;
    }

    body{
        display:flex;
        justify-content:center;
        align-items:center;
        height:100vh;
        background:linear-gradient(135deg,white,#2a5298);
    }

    .calculator{
        width:320px;
        background:brown;
        padding:20px;
        border-radius:15px;
        box-shadow:0 8px 20px rgba(0,0,0,0.4);
    }

    .display{
        width:100%;
        height:70px;
        background:silver;
        color:black;
        border:none;
        border-radius:10px;
        text-align:right;
        padding:15px;
        font-size:2rem;
        margin-bottom:15px;
    }

    .buttons{
        display:grid;
        grid-template-columns:repeat(4,1fr);
        gap:10px;
    }

    button{
        padding:18px;
        font-size:1.2rem;
        border:none;
        border-radius:10px;
        cursor:pointer;
        transition:0.2s;
    }

    button:hover{
        transform:scale(1.05);
    }

    .number{
        background:blueviolet;
        color:white;
    }

    .operator{
        background:#white;
        color:black;
    }

    .clear{
        background:gold;
        color:black;
    }

    .equal{
        background:#gray;
        color:black;
        grid-column:span 2;
    }
</style>
</head>
<body>

<div class="calculator">
    <input type="text" class="display" id="display" readonly>

    <div class="buttons">
        <button class="clear" onclick="clearDisplay()">C</button>
        <button class="clear" onclick="deleteLast()">⌫</button>
        <button class="operator" onclick="appendValue('%')">%</button>
        <button class="operator" onclick="appendValue('/')">÷</button>

        <button class="number" onclick="appendValue('7')">7</button>
        <button class="number" onclick="appendValue('8')">8</button>
        <button class="number" onclick="appendValue('9')">9</button>
        <button class="operator" onclick="appendValue('*')">×</button>

        <button class="number" onclick="appendValue('4')">4</button>
        <button class="number" onclick="appendValue('5')">5</button>
        <button class="number" onclick="appendValue('6')">6</button>
        <button class="operator" onclick="appendValue('-')">−</button>

        <button class="number" onclick="appendValue('1')">1</button>
        <button class="number" onclick="appendValue('2')">2</button>
        <button class="number" onclick="appendValue('3')">3</button>
        <button class="operator" onclick="appendValue('+')">+</button>

        <button class="number" onclick="appendValue('0')">0</button>
        <button class="number" onclick="appendValue('.')">.</button>
        <button class="equal" onclick="calculate()">=</button>
    </div>
</div>

<script>
    const display = document.getElementById("display");

    function appendValue(value){
        display.value += value;
    }

    function clearDisplay(){
        display.value = "";
    }

    function deleteLast(){
        display.value = display.value.slice(0, -1);
    }

    function calculate(){
        try{
            let result = eval(display.value);
            display.value = result;
        }
        catch{
            display.value = "Error";
        }
    }

    // Keyboard Support using Event Listeners
    document.addEventListener("keydown", function(event){
        const key = event.key;

        if((key >= "0" && key <= "9") || "+-*/.%".includes(key)){
            appendValue(key);
        }
        else if(key === "Enter"){
            calculate();
        }
        else if(key === "Backspace"){
            deleteLast();
        }
        else if(key === "Escape"){
            clearDisplay();
        }
    });
</script>

</body>
</html>
